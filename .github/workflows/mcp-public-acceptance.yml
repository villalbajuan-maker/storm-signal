name: MCP Public Acceptance

on:
  workflow_dispatch:
  schedule:
    - cron: "23 14 * * *"

permissions:
  contents: read

concurrency:
  group: mcp-public-acceptance
  cancel-in-progress: false

jobs:
  public-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify public MCP contract
        run: python scripts/test_mcp_public_smoke.py
