name: Manual ingestion recovery

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source to ingest
        required: true
        default: all
        type: choice
        options:
          - all
          - nws
          - spc

permissions:
  contents: read

concurrency:
  group: storm-signal-manual-recovery-${{ inputs.source || 'manual' }}
  cancel-in-progress: false

jobs:
  nws:
    if: inputs.source == 'all' || inputs.source == 'nws'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Ingest NWS warnings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          PYTHONPATH: src
        run: python -m storm_signal_recon.ingest --source nws

  spc:
    if: inputs.source == 'all' || inputs.source == 'spc'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Ingest SPC severe-weather reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          PYTHONPATH: src
        run: python -m storm_signal_recon.ingest --source spc
